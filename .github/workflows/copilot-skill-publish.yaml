name: Publish skills to GitHub Copilot

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - '.github/workflows/copilot-skill-publish.yaml'

permissions:
  contents: read

jobs:
  publish-skills:
    name: Publish skills to GitHub Copilot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check gh version
        run: gh --version

      - name: Publish skills
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh skill publish
